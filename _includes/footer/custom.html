{% if page.mathjax or content contains '$$' or content contains '\(' %}
<!-- MathJax — loaded only on pages that contain TeX math (or set mathjax: true).
     The Lab film pages use KaTeX instead and must not double-load a math stack. -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    }
  };
</script>
<!-- MathJax 3's combined tex-mml-chtml bundle is self-contained; no polyfill
     is needed on any browser from the last several years. Pinned + SRI. -->
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3.2.0/es5/tex-mml-chtml.js" integrity="sha384-+BSz3oj3ILMYvOBr16U9i0H4RZRmGyQQ+1q9eqr8T3skmAFrJk8GmgwgqlCZdNSo" crossorigin="anonymous" id="MathJax-script"></script>
{% endif %}

{% if content contains 'language-mermaid' %}
<!-- Mermaid — loaded only on pages that contain a ```mermaid block -->
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.esm.min.mjs';
    mermaid.initialize({startOnLoad:true, theme:'default'});
    await mermaid.run({querySelector:'code.language-mermaid'});
</script>
{% endif %}
