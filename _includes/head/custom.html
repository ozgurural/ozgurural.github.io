{% include base_path %}

<!-- start custom head snippets -->

<script>
  (function() {
    var theme = localStorage.getItem("theme") || "system";
    if (theme === "system") {
      theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    if (theme === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    } else {
      document.documentElement.removeAttribute("data-theme");
    }
  })();
</script>

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#0a0f1c" media="(prefers-color-scheme: dark)"/>

<!-- Premium typography: Inter (UI/body), Space Grotesk (display), JetBrains Mono (code) -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"/>

{% if page.url == "/" or page.url == "/index.html" %}
<!-- Particles engine loads once at the end of body (scripts.html); the
     deferred topology script runs after it at DOMContentLoaded. -->
<link rel="preload" as="script" href="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"/>
<script src="/assets/js/home-topology.js" defer></script>
<!-- On the home page the hero supplies the H1 — hide duplicate page__title -->
<script>document.documentElement.classList.add('ep-home');</script>
{% endif %}

<!-- Prerender same-site pages when a link is hovered, so tab clicks feel
     instant instead of flashing a blank frame (progressive enhancement) -->
<script type="speculationrules">
{
  "prerender": [{
    "where": { "and": [
      { "href_matches": "/*" },
      { "not": { "href_matches": "/*.pdf" } },
      { "not": { "selector_matches": "[download]" } }
    ]},
    "eagerness": "moderate"
  }]
}
</script>

<!-- end custom head snippets -->
