{% include base_path %}

<!-- start custom head snippets -->

<script>
  /* Force dark mode — light mode removed */
  document.documentElement.setAttribute("data-theme", "dark");
</script>

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon for Dr. Ozgur Ural -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#0a0f1c"/>

<!-- Premium typography: Inter (UI/body), Space Grotesk (display), JetBrains Mono (code) -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'"/>
<noscript>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"/>
</noscript>

{% if page.url == "/" or page.url == "/index.html" %}
<!-- Particles engine loads once at the end of body (scripts.html) -->
<link rel="preload" as="script" href="{{ base_path }}/assets/js/tsparticles.bundle.min.js"/>
<!-- On the home page the hero supplies the H1 — hide duplicate page__title -->
<script>document.documentElement.classList.add('ep-home');</script>
{% endif %}

<!-- Prerender same-site pages when a link is hovered, so tab clicks feel
     instant instead of flashing a blank frame (progressive enhancement) -->
<script type="speculationrules">
{
  "prerender": [{
    "where": { "and": [
      { "href_matches": "/*" },
      { "not": { "href_matches": "/*.pdf" } },
      { "not": { "selector_matches": "[download]" } }
    ]},
    "eagerness": "moderate"
  }]
}
</script>

<!-- end custom head snippets -->
