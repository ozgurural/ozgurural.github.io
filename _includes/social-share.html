{% include base_path %}

<section class="page__share">
  {% if site.data.ui-text[site.locale].share_on_label %}
  <h4 class="page__share-title">{{ site.data.ui-text[site.locale].share_on_label | default: "Share on" }}</h4>
  {% endif %}

  <a href="https://x.com/intent/post?text={{ site.url | append: page.url | url_encode }}" class="btn btn--x"
    title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} X"><i class="fab fa-x-twitter"
      aria-hidden="true"></i><span> X</span></a>

  <a href="https://www.linkedin.com/shareArticle?mini=true&url={{ site.url | append: page.url | url_encode }}" class="btn btn--linkedin"
    title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} LinkedIn"><i
      class="fab fa-linkedin" aria-hidden="true"></i><span> LinkedIn</span></a>

  <a href="https://www.reddit.com/submit?url={{ site.url | append: page.url | url_encode }}&title={{ page.title | url_encode }}" class="btn btn--reddit"
    title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} Reddit"><i
      class="fab fa-reddit" aria-hidden="true"></i><span> Reddit</span></a>

  <a href="https://news.ycombinator.com/submitlink?u={{ site.url | append: page.url | url_encode }}&t={{ page.title | url_encode }}" class="btn btn--hackernews"
    title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} Hacker News"><i
      class="fab fa-hacker-news" aria-hidden="true"></i><span> Hacker News</span></a>

  <a href="https://bsky.app/intent/compose?text={{ site.url | append: page.url | url_encode }}" class="btn btn--bluesky"
    title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} Bluesky"><i class="fab fa-bluesky"
      aria-hidden="true"></i><span> Bluesky</span></a>
</section>
