name: Build CV PDF

# Compiles cv/resume.tex and publishes it as the site's
# Ozgur_Ural_PhD_Resume.pdf on every change to the LaTeX source.
# The path filter is scoped to cv/**, so the resulting PDF commit
# (at repo root) does not retrigger this workflow — no build loop.

on:
  push:
    branches: [master]
    paths:
      - 'cv/**'
      - '.github/workflows/build-cv.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile resume (pdfLaTeX / TeX Live)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: cv
          root_file: resume.tex

      - name: Publish PDF to site root
        run: mv cv/resume.pdf Ozgur_Ural_PhD_Resume.pdf

      - name: Commit rebuilt PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(cv): rebuild Ozgur_Ural_PhD_Resume.pdf [skip ci]'
          file_pattern: Ozgur_Ural_PhD_Resume.pdf
